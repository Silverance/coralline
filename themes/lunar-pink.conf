# coralline theme: lunar-pink
# After tronfy's "Lunar Pink" VSCode theme — a vibrant, pink-forward palette
# on near-black. The lead colors (light/hot pink, bright/muted cyan, yellow)
# carry the always-on segments; minor segments use secondary tints. Gauge
# segments use dark graphite so their threshold bars (green/yellow/red) stay
# legible on top.
#
# VL_FG_TEXT is a dark value (not empty): in pill style it is the dark text on
# the neon pills; in lean style coralline overrides it internally so text
# inherits each segment's accent. The theme therefore works in both styles.

# ── lead colors on the prominent, always-on segments ──
VL_BG_DIR="223,108,190"        # light pink  #DF6CBE  (the wide path segment)
VL_BG_MODEL="230,33,175"       # hot pink    #E621AF  (the signature color)
VL_BG_COST="255,217,0"         # yellow      #FFD900
VL_BG_CLOCK="9,228,230"        # bright cyan #09E4E6

# git: clean = muted cyan, dirty = bright blue (both legible in pill and lean)
VL_BG_GIT_OK="5,166,168"       # muted cyan  #05A6A8
VL_BG_GIT_DIRTY="0,140,255"    # blue        #008CFF

# ── gauge canvases: dark, so the green/yellow/red bars read on top ──
VL_BG_CTX="56,56,56"           # graphite #383838
VL_BG_5H="45,45,45"            # graphite #2D2D2D
VL_BG_7D="34,34,34"            # graphite #222222
VL_BG_LINES="56,56,56"         # graphite (lets the +green / -red counts show)

# ── secondary tints on the minor segments ──
VL_BG_PROJECT="121,224,226"    # cyan light  #79E0E2
VL_BG_STYLE="224,158,206"      # pink lighter #E09ECE
VL_BG_DURATION="121,224,226"   # cyan light  #79E0E2
VL_BG_EFFORT="240,184,0"       # amber       #F0B800  (warm accent for reasoning effort)

VL_FG_TEXT="19,19,19"          # near-black: dark text on the neon pills (#131313)
VL_FG_DIM="119,119,119"        # grey comment   #777777
VL_FG_OK="42,230,9"            # green   (gauge low / added)        #2AE609
VL_FG_WARN="255,217,0"         # yellow  (gauge mid / editorWarning) #FFD900
VL_FG_HOT="197,0,0"            # deep red (gauge high / deleted)     #C50000
